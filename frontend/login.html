<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAILSAFE — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0b0d14;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #fff;
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .card {
      background: #13151f;
      border: 1px solid #1e2133;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #0b0d14;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active { background: #1e2133; color: #a5b4fc; font-weight: 600; }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      background: #0b0d14;
      border: 1px solid #1e2133;
      border-radius: 8px;
      padding: 11px 14px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 6px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }

    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="brand">FAILSAFE</div>
  <div class="brand-sub">Student Risk Prediction System</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Login</button>
      <button class="tab" onclick="switchTab('register', this)">Register</button>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="faculty@college.edu" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Dr. Avni Jhalani" required/>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="faculty@college.edu" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 characters" required/>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
  </div>

<script>
  // If already logged in, go to dashboard
  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').style.display = name === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = name === 'register' ? 'block' : 'none';
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideMessages();
    try {
      const res = await fetch('https://failsafe-production-9c45.up.railway.app/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.detail); return; }
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('name', data.name);
      window.location.href = 'index.html';
    } catch(err) {
      showError('Login failed: ' + err.message);
    }
  });

  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideMessages();
    try {
      const res = await fetch('https://failsafe-production-9c45.up.railway.app/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value
        })
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { showError('Server error: ' + text.slice(0, 100)); return; }
      if (!res.ok) { showError(data.detail || 'Server error ' + res.status); return; }
      showSuccess('Account created! Please login.');
      switchTab('login', document.querySelectorAll('.tab')[0]);
    } catch(err) {
      showError('Register failed: ' + err.message);
    }
  });
</script>
</body>
</html>
